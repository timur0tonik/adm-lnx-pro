---
- hosts: all
  become: yes
  gather_facts: yes
  tasks:
    - name: Install required system packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
        state: present
        update_cache: yes
      tags: docker

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present
      tags: docker

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
      tags: docker

    - name: Install Docker CE
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: yes
      tags: docker

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: yes
      tags: docker

    - name: Add user 'vagrant' to docker group
      user:
        name: vagrant
        groups: docker
        append: yes
      tags: docker

    - name: Copy project files to VM
      copy:
        src: /vagrant/project/
        dest: /home/vagrant/project
        owner: vagrant
        group: vagrant
        mode: preserve

    # Сбрасываем SSH, чтобы группа docker применилась
    - name: Reset SSH connection to apply group changes
      meta: reset_connection

    # Запуск через docker compose (плагин) с использованием sg для активации группы
    - name: Run docker compose up
      shell:
        cmd: sg docker -c "docker compose -f docker-compose.yml up -d"
        chdir: /home/vagrant/project
      become_user: vagrant
      become: no