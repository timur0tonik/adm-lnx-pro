---
- name: Install base tools
  hosts: all
  become: yes
  tasks:
    - name: Install base utilities and acl package
      apt:
        name: [vim, telnet, wget, curl, acl]
        state: present
        update_cache: yes

- name: Install PostgreSQL 17 and configure replication
  hosts: node1,node2
  become: yes
  vars:
    postgres_version: "17"
    replicator_password: "Otus2022!"
    master_ip: "192.168.57.11"
    slave_ip: "192.168.57.12"
    barman_password: "Otus2022!"
  tasks:
    - name: Add PostgreSQL GPG key
      apt_key:
        url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
        state: present

    - name: Add PostgreSQL repository (Ubuntu 24.04 = noble)
      apt_repository:
        repo: "deb http://apt.postgresql.org/pub/repos/apt noble-pgdg main"
        state: present
        filename: pgdg

    - name: Install PostgreSQL 17
      apt:
        name:
          - "postgresql-{{ postgres_version }}"
          - "postgresql-contrib-{{ postgres_version }}"
        state: present
        update_cache: yes

    - name: Wait for PostgreSQL service
      systemd:
        name: postgresql
        state: started
        enabled: yes

    - name: Wait for PostgreSQL port
      wait_for:
        port: 5432
        timeout: 30

    # === MASTER CONFIGURATION ===
    - name: Create replicator user on master
      become_user: postgres
      community.postgresql.postgresql_user:
        name: replicator
        password: "{{ replicator_password }}"
        role_attr_flags: REPLICATION
      when: ansible_hostname == "node1"

    - name: Create barman user on master
      become_user: postgres
      community.postgresql.postgresql_user:
        name: barman
        password: "{{ barman_password }}"
        role_attr_flags: "SUPERUSER,REPLICATION"
      when: ansible_hostname == "node1"

    - name: Configure PostgreSQL parameters on master via ALTER SYSTEM
      become_user: postgres
      community.postgresql.postgresql_set:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
      loop:
        - { name: listen_addresses, value: 'localhost,{{ master_ip }}' }
        - { name: wal_level, value: replica }
        - { name: max_wal_senders, value: 3 }
        - { name: max_replication_slots, value: 3 }
        - { name: hot_standby, value: 'on' }
        - { name: hot_standby_feedback, value: 'on' }
        - { name: max_wal_size, value: 1GB }
        - { name: min_wal_size, value: 80MB }
        - { name: password_encryption, value: 'scram-sha-256' }
      when: ansible_hostname == "node1"

    - name: Configure pg_hba.conf on master
      template:
        src: pg_hba.conf.j2
        dest: "/etc/postgresql/{{ postgres_version }}/main/pg_hba.conf"
        owner: postgres
        group: postgres
        mode: '0644'
      vars:
        target_host: master
      when: ansible_hostname == "node1"

    - name: Restart PostgreSQL service
      systemd:
        name: postgresql
        state: restarted
      when: ansible_hostname == "node1"

    - name: Wait a bit for PostgreSQL to start or fail
      pause:
        seconds: 5
      when: ansible_hostname == "node1"

    - name: Check PostgreSQL cluster status
      command: systemctl is-active postgresql@17-main
      register: pg_status
      failed_when: false
      changed_when: false
      when: ansible_hostname == "node1"

    - name: Show PostgreSQL cluster logs if inactive
      shell: journalctl -u postgresql@17-main -n 50 --no-pager
      register: pg_logs_inactive
      when:
        - ansible_hostname == "node1"
        - pg_status.stdout != "active"
      failed_when: false

    - name: Fail if PostgreSQL cluster is not active
      fail:
        msg: "PostgreSQL cluster 17-main is not active after restart. Logs:\n{{ pg_logs_inactive.stdout }}"
      when:
        - ansible_hostname == "node1"
        - pg_status.stdout != "active"

    - name: Wait for PostgreSQL to be ready (extended timeout)
      wait_for:
        host: "{{ master_ip }}"
        port: 5432
        timeout: 60
      register: wait_result
      ignore_errors: yes
      when: ansible_hostname == "node1"

    - name: Show PostgreSQL cluster logs if wait failed
      shell: journalctl -u postgresql@17-main -n 50 --no-pager
      register: pg_logs_fail
      when:
        - ansible_hostname == "node1"
        - wait_result is failed
      failed_when: false

    - name: Fail if PostgreSQL is not ready
      fail:
        msg: "PostgreSQL not ready. Logs: {{ pg_logs_fail.stdout }}"
      when:
        - ansible_hostname == "node1"
        - wait_result is failed

    - name: Create replication slot for slave
      become_user: postgres
      community.postgresql.postgresql_slot:
        name: node1_slot
        slot_type: physical
      when: ansible_hostname == "node1"

    - name: Create replication slot for barman
      become_user: postgres
      community.postgresql.postgresql_slot:
        name: barman_slot
        slot_type: physical
      when: ansible_hostname == "node1"

    # === SLAVE CONFIGURATION ===
    - name: Stop PostgreSQL on slave
      systemd:
        name: postgresql
        state: stopped
      when: ansible_hostname == "node2"

    - name: Remove existing data directory on slave
      file:
        path: "/var/lib/postgresql/{{ postgres_version }}/main"
        state: absent
      when: ansible_hostname == "node2"

    - name: Create empty data directory
      file:
        path: "/var/lib/postgresql/{{ postgres_version }}/main"
        state: directory
        owner: postgres
        group: postgres
        mode: '0700'
      when: ansible_hostname == "node2"

    - name: Create .pgpass for postgres user on slave
      copy:
        content: "{{ master_ip }}:5432:replication:replicator:{{ replicator_password }}\n"
        dest: /var/lib/postgresql/.pgpass
        owner: postgres
        group: postgres
        mode: '0600'
      when: ansible_hostname == "node2"

    - name: Copy data from master using pg_basebackup (with .pgpass)
      shell: |
        sudo -u postgres pg_basebackup -h {{ master_ip }} -U replicator -D /var/lib/postgresql/{{ postgres_version }}/main -R -P -X stream -w
      args:
        creates: "/var/lib/postgresql/{{ postgres_version }}/main/PG_VERSION"
      when: ansible_hostname == "node2"

    - name: Configure pg_hba.conf on slave
      template:
        src: pg_hba.conf.j2
        dest: "/etc/postgresql/{{ postgres_version }}/main/pg_hba.conf"
        owner: postgres
        group: postgres
        mode: '0644'
      vars:
        target_host: slave
      when: ansible_hostname == "node2"

    - name: Start PostgreSQL on slave
      systemd:
        name: postgresql
        state: started
      when: ansible_hostname == "node2"

    - name: Wait for PostgreSQL to be ready on slave
      wait_for:
        port: 5432
        timeout: 30
      when: ansible_hostname == "node2"

    - name: Configure PostgreSQL parameters on slave via ALTER SYSTEM
      become_user: postgres
      community.postgresql.postgresql_set:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
      loop:
        - { name: listen_addresses, value: 'localhost,{{ slave_ip }}' }
        - { name: wal_level, value: replica }
        - { name: max_wal_senders, value: 3 }
        - { name: max_replication_slots, value: 3 }
        - { name: hot_standby, value: 'on' }
        - { name: hot_standby_feedback, value: 'on' }
        - { name: password_encryption, value: 'scram-sha-256' }
      when: ansible_hostname == "node2"

    - name: Restart PostgreSQL to apply changes on slave
      systemd:
        name: postgresql
        state: restarted
      when: ansible_hostname == "node2"

    # === BARMAN CONFIGURATION ===
- name: Install and configure Barman
  hosts: barman
  become: yes
  vars:
    master_ip: "192.168.57.11"
    barman_password: "Otus2022!"
    postgres_version: "17"
  tasks:
    - name: Add PostgreSQL GPG key
      apt_key:
        url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
        state: present

    - name: Add PostgreSQL repository
      apt_repository:
        repo: "deb http://apt.postgresql.org/pub/repos/apt noble-pgdg main"
        state: present
        filename: pgdg

    - name: Install Barman
      apt:
        name: [barman, barman-cli, "postgresql-client-{{ postgres_version }}"]
        state: present
        update_cache: yes

    - name: Create .pgpass file
      copy:
        content: "{{ master_ip }}:5432:*:barman:{{ barman_password }}\n"
        dest: /var/lib/barman/.pgpass
        owner: barman
        group: barman
        mode: '0600'

    - name: Configure barman.conf
      template:
        src: barman.conf.j2
        dest: /etc/barman.conf
        owner: barman
        group: barman
        mode: '0644'

    - name: Create barman.d directory
      file:
        path: /etc/barman.d
        state: directory
        owner: barman
        group: barman
        mode: '0755'

    - name: Configure node1 backup server
      template:
        src: node1.conf.j2
        dest: /etc/barman.d/node1.conf
        owner: barman
        group: barman
        mode: '0644'

    - name: Add master to /etc/hosts
      lineinfile:
        path: /etc/hosts
        line: "{{ master_ip }} node1"
        state: present

    - name: Run initial barman check
      become: yes
      become_user: barman
      command: barman check node1
      register: barman_check
      ignore_errors: yes

    - name: Show barman check result
      debug:
        var: barman_check.stdout_lines