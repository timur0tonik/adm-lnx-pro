---
- name: Install MySQL Server
  apt:
    name: mysql-server
    state: present
    update_cache: yes

- name: Install Python MySQL library for Ansible
  apt:
    name: python3-pymysql
    state: present

- name: Configure MySQL
  template:
    src: templates/mysqld.cnf.j2
    dest: /etc/mysql/mysql.conf.d/mysqld.cnf
    owner: root
    group: root
    mode: '0644'
  notify: restart mysql

- name: Start MySQL
  service:
    name: mysql
    state: started
    enabled: yes

- name: Create .my.cnf for root MySQL access
  copy:
    dest: /root/.my.cnf
    content: |
      [client]
      user=root
      password=
      socket=/var/run/mysqld/mysqld.sock
    mode: '0600'

- name: Change root authentication to mysql_native_password
  shell: |
    mysql --connect-expired-password -e "ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY '';" 2>/dev/null || true
    mysql -e "FLUSH PRIVILEGES;"
  ignore_errors: yes

- name: Create WordPress DB and user (shell fallback)
  shell: |
    mysql -e "CREATE DATABASE IF NOT EXISTS wordpress;"
    mysql -e "CREATE USER IF NOT EXISTS 'wp_user'@'%' IDENTIFIED BY 'wp_pass_123';"
    mysql -e "GRANT ALL PRIVILEGES ON wordpress.* TO 'wp_user'@'%';"
    mysql -e "FLUSH PRIVILEGES;"
  when: db_role == 'master'

- name: Ensure wp_user uses mysql_native_password
  mysql_user:
    name: wp_user
    host: '%'
    password: wp_pass_123
    plugin: mysql_native_password
    priv: "wordpress.*:ALL"
    state: present
    login_unix_socket: /var/run/mysqld/mysqld.sock
  when: db_role == 'master'

- name: Create replication user on master
  mysql_user:
    name: repl_user
    password: repl_pass_123
    priv: "*.*:REPLICATION SLAVE"
    host: "%"
    state: present
    login_unix_socket: /var/run/mysqld/mysqld.sock
  when: db_role == 'master'